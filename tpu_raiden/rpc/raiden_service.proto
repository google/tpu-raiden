syntax = "proto3";

package tpu_raiden.rpc;

option java_multiple_files = true;
option java_outer_classname = "RaidenServiceProto";

message RaidenIdProto {
  string job_name = 1;
  string job_replica_id = 2;
  string data_name = 3;
  int32 data_replica_idx = 4;
}

// Coordinate intervals representing a contiguous slice along a single tensor
// dimension.
message NDSliceDimensionProto {
  // Inclusive start coordinate.
  int64 start = 1;
  // Exclusive end coordinate.
  int64 end = 2;
}

// Slices representing a multi-dimensional bounding box inside a distributed
// tensor.
message NDSliceProto {
  // Dimension intervals ordered from outer-most dimension to inner-most minor
  // dimension.
  repeated NDSliceDimensionProto dimensions = 1;
}

// A strided run of live bytes inside one pool block.
message RegionSpecProto {
  string name = 1;
  int64 offset_bytes = 2;
  int64 stride_bytes = 3;
  int64 unit_bytes = 4;
  int64 num_units = 5;
  int64 units_per_stride = 6;
}

// One block pool inside a wrapped storage. tag and dtype_tag are opaque to
// raiden: stored, filtered, and echoed, never parsed.
message PoolSpecProto {
  string tag = 1;
  int64 storage_index = 2;
  int64 base_offset_bytes = 3;
  int64 block_stride_bytes = 4;
  int64 num_blocks = 5;
  repeated RegionSpecProto regions = 6;
  string dtype_tag = 7;
}

message RegisterWorkUnitRequest {
  RaidenIdProto unit = 1;
  repeated string shards = 2;
  string control_plane_rpc_address = 3;
  int32 itemsize = 5;
  repeated int64 mesh_shape = 6;
  repeated int32 layout = 7;
  repeated int64 global_shape = 8;
  // Canonical explicit-pool manifest and physical layout identity used by the
  // controller to fail closed before planning a raw-byte pool transfer.
  repeated PoolSpecProto pools = 9;
  string layout_fingerprint = 10;
  int64 page_tokens = 11;
  int32 transfer_parallelism = 12;
  // Stable transfer rank inside the producer group. This is distinct from
  // data_replica_idx (the DP engine identity); declared source spans arrive on
  // the registration of the rank that owns them.
  int32 transfer_rank = 13;
}

// Defines an explicit 1D linear memory push operation from a local source to a
// remote destination shard.
message ShardPushEntryProto {
  // Network coordinate "ip:port" or BNS of the remote Destination Worker Data
  // servicer.
  string dst_peer = 1;
  // Logical shard partition index managed by the target Destination Worker
  // process.
  int32 dst_shard_idx = 2;
  // Exact linear memory byte offset to paste data into within the target
  // destination buffer.
  int64 dst_offset_bytes = 3;
  // Exact linear memory byte offset to copy data out of within the local source
  // buffer.
  int64 src_offset_bytes = 4;
  // Number of continuous bytes to transmit across the TCP stream.
  int64 size_bytes = 5;
  int32 src_block_id = 6;
  int32 dst_block_id = 7;
  int64 src_stride_bytes = 8;
  int64 dst_stride_bytes = 9;
  int32 count = 10;
}

// A collection of network push entries orchestrated by a specific source TPU
// shard.
message ShardPushScheduleProto {
  repeated ShardPushEntryProto entries = 1;
}

enum MemoryType {
  MEMORY_TYPE_UNSPECIFIED = 0;
  MEMORY_TYPE_DRAM = 1;
  MEMORY_TYPE_HBM = 2;
}

message StartTransferRequest {
  repeated RaidenIdProto src_units = 1;
  repeated RaidenIdProto dst_units = 2;
  // Centralized transfer execution plans mapped by local Source Worker logical
  // shard partition index.
  map<int32, ShardPushScheduleProto> shard_push_schedules = 3;
  int64 uuid = 4;
  bool is_sender = 5;
  MemoryType dst_mem_type = 6;
  bool use_block_chunks = 7;
  int64 expected_block_count = 8;
  string req_id = 9;
  // Sender's per-pool dtype tags in canonical pool order. When non-empty and
  // the receiving manager has explicitly registered pools, the tags must match
  // the local pools' dtype tags at plan registration.
  repeated string pool_dtype_tags = 10;
  // Pool-keyed receive accounting. Each listed transfer pool expects this
  // many independent push streams (summed across senders) before its
  // completion callback fires. Zero preserves the legacy header-declared
  // (header.reserved) accounting.
  int32 expected_pushes_per_pool = 11;
  // Canonical pool indices moved by this plan, resolved by the controller
  // from the consumer's requested pool tags. Unselected pools are never
  // armed; raiden attaches no meaning to any tag name.
  repeated int32 transfer_pool_indices = 12;
  // Block-granular arguments consumed by the pool executor. The controller
  // emits only the IDs relevant to the worker receiving this command.
  repeated int64 src_block_ids = 13;
  repeated int64 dst_device_block_ids = 14;
  int32 parallelism = 15;
  int64 num_tokens = 16;
}

message GetMetadataResponse {
  repeated RegisterWorkUnitRequest metadata = 1;
}

message ControlRequest {
  enum Command {
    COMMAND_UNSPECIFIED = 0;
    COMMAND_START_TRANSFER = 1;
    COMMAND_SHUTDOWN = 2;
    COMMAND_REGISTER_WORK_UNIT = 3;
    COMMAND_GET_METADATA = 4;
    COMMAND_REGISTER_TRANSFER_SCHEDULE = 5;
  }
  Command command = 1;
  repeated string peers = 2;

  StartTransferRequest start_transfer_request = 3;
  RegisterWorkUnitRequest register_work_unit_request = 4;
}

message ControlResponse {
  bool success = 1;
  string message = 2;
  string response_data = 3;
  GetMetadataResponse get_metadata_response = 4;
}
