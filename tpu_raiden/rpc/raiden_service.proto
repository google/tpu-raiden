syntax = "proto3";

package tpu_raiden.rpc;

option java_multiple_files = true;
option java_outer_classname = "RaidenServiceProto";

message RaidenIdProto {
  string job_name = 1;
  string job_replica_id = 2;
  string data_name = 3;
  int32 data_replica_idx = 4;
}

// Coordinate intervals representing a contiguous slice along a single tensor
// dimension.
message NDSliceDimensionProto {
  // Inclusive start coordinate.
  int64 start = 1;
  // Exclusive end coordinate.
  int64 end = 2;
}

// Slices representing a multi-dimensional bounding box inside a distributed
// tensor.
message NDSliceProto {
  // Dimension intervals ordered from outer-most dimension to inner-most minor
  // dimension.
  repeated NDSliceDimensionProto dimensions = 1;
}

message RegisterWorkUnitRequest {
  RaidenIdProto unit = 1;
  repeated string shards = 2;
  string control_plane_rpc_address = 3;
  int32 itemsize = 5;
  repeated int64 mesh_shape = 6;
  repeated int32 layout = 7;
  repeated int64 global_shape = 8;
}

// Defines an explicit 1D linear memory push operation from a local source to a
// remote destination shard.
message ShardPushEntryProto {
  // Network coordinate "ip:port" or BNS of the remote Destination Worker Data
  // servicer.
  string dst_peer = 1;
  // Logical shard partition index managed by the target Destination Worker
  // process.
  int32 dst_shard_idx = 2;
  // Exact linear memory byte offset to paste data into within the target
  // destination buffer.
  int64 dst_offset_bytes = 3;
  // Exact linear memory byte offset to copy data out of within the local source
  // buffer.
  int64 src_offset_bytes = 4;
  // Number of continuous bytes to transmit across the TCP stream.
  int64 size_bytes = 5;
  int32 src_block_id = 6;
  int32 dst_block_id = 7;
  int64 src_stride_bytes = 8;
  int64 dst_stride_bytes = 9;
  int32 count = 10;
}

// A collection of network push entries orchestrated by a specific source TPU
// shard.
message ShardPushScheduleProto {
  repeated ShardPushEntryProto entries = 1;
}

enum MemoryType {
  MEMORY_TYPE_UNSPECIFIED = 0;
  MEMORY_TYPE_DRAM = 1;
  MEMORY_TYPE_HBM = 2;
}

message StartTransferRequest {
  repeated RaidenIdProto src_units = 1;
  repeated RaidenIdProto dst_units = 2;
  // Centralized transfer execution plans mapped by local Source Worker logical
  // shard partition index.
  map<int32, ShardPushScheduleProto> shard_push_schedules = 3;
  int64 uuid = 4;
  bool is_sender = 5;
  MemoryType dst_mem_type = 6;
  bool use_block_chunks = 7;
  int64 expected_block_count = 8;
  string req_id = 9;
  MemoryType src_mem_type = 10;
}

message FetchNegotiationRequest {
  repeated string block_hashes = 1;
  RaidenIdProto src_unit = 2;
  RaidenIdProto dst_unit = 3;
  repeated string dst_worker_data_addresses = 4;
  repeated int32 dst_block_ids = 5;
  int64 uuid = 6;
}

message FetchNegotiationResponse {
  repeated string found_block_hashes = 1;
  repeated string missing_block_hashes = 2;
}

message GetMetadataResponse {
  repeated RegisterWorkUnitRequest metadata = 1;
}

message ControlRequest {
  enum Command {
    COMMAND_UNSPECIFIED = 0;
    COMMAND_START_TRANSFER = 1;
    COMMAND_SHUTDOWN = 2;
    COMMAND_REGISTER_WORK_UNIT = 3;
    COMMAND_GET_METADATA = 4;
    COMMAND_REGISTER_TRANSFER_SCHEDULE = 5;
    COMMAND_RESOLVE_CONTROLLER = 6;
    COMMAND_NEGOTIATE_FETCH = 7;
    COMMAND_GET_ENDPOINTS = 8;
    COMMAND_TRANSFER_COMPLETED = 9;
    COMMAND_EXECUTE_FETCH = 10;
    COMMAND_EXECUTE_LOAD = 11;
    COMMAND_LOAD_COMPLETED = 12;
    COMMAND_EXECUTE_SAVE = 13;
    COMMAND_SAVE_COMPLETED = 14;
    COMMAND_EXECUTE_EVICT = 15;
    COMMAND_EVICT_COMPLETED = 16;
  }
  Command command = 1;
  repeated string peers = 2;

  StartTransferRequest start_transfer_request = 3;
  RegisterWorkUnitRequest register_work_unit_request = 4;
  RaidenIdProto target_unit = 5;
  FetchNegotiationRequest fetch_negotiation_request = 6;
  repeated int32 completed_block_ids = 7;
  LoadRequest load_request = 8;
  bool success = 9;
  string error_message = 10;
  SaveRequest save_request = 11;
  EvictRequest evict_request = 12;
  // Transfer uuid for COMMAND_TRANSFER_COMPLETED: lets the controller map the
  // (possibly worker-auto-allocated) completed_block_ids back to block hashes by
  // order, so remote-fetch completions are keyed by hash, not by block id.
  int64 transfer_uuid = 13;
}

message ControlResponse {
  bool success = 1;
  string message = 2;
  string response_data = 3;
  GetMetadataResponse get_metadata_response = 4;
  FetchNegotiationResponse fetch_negotiation_response = 5;
  repeated string endpoints = 6;
  StartTransferRequest start_transfer_request = 7;
}

message ShardLoadEntryProto {
  int32 src_block_id = 1;
  int32 dst_block_id = 2;
}

message ShardLoadScheduleProto {
  repeated ShardLoadEntryProto entries = 1;
}

message LoadRequest {
  int64 uuid = 1;
  // Key: local shard partition index
  map<int32, ShardLoadScheduleProto> shard_load_schedules = 2;
}

message ShardSaveEntryProto {
  int32 src_block_id = 1;
  int32 dst_block_id = 2;
}

message ShardSaveScheduleProto {
  repeated ShardSaveEntryProto entries = 1;
}

message SaveRequest {
  int64 uuid = 1;
  // Key: local shard partition index
  map<int32, ShardSaveScheduleProto> shard_save_schedules = 2;
}

message ShardEvictEntryProto {
  int32 host_block_id = 1;
}

message ShardEvictScheduleProto {
  repeated ShardEvictEntryProto entries = 1;
}

message EvictRequest {
  int64 uuid = 1;
  // Key: local shard partition index
  map<int32, ShardEvictScheduleProto> shard_evict_schedules = 2;
}
