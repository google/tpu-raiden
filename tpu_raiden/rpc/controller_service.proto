syntax = "proto3";

package tpu_raiden.rpc;

import "tpu_raiden/rpc/raiden_service.proto";

option java_multiple_files = true;
option java_outer_classname = "ControllerServiceProto";

// Public request from external Scheduler to Raiden Controller to coordinate
// collective transfer across workers.
message CoordinateTransferRequest {
  repeated RaidenIdProto src_units = 1;
  repeated RaidenIdProto dst_units = 2;
  int64 uuid = 3;
  bool is_sender = 4;
  MemoryType dst_mem_type = 5;
  bool use_block_chunks = 6;
  int64 expected_block_count = 7;
  string req_id = 8;
  string src_controller_address = 9;
  string dst_controller_address = 10;
  // Block-granular reshard inputs. Source block IDs are looked up from the
  // producer-side registry and deliberately never cross vLLM metadata.
  repeated int64 dst_device_block_ids = 11;
  // Opaque audit metadata echoed into controller log events; planning and
  // receiver validation never consume it (extents carry the coverage).
  int64 num_tokens = 12;
  // Pool tags the consumer wants moved (e.g. "fa"). The controller resolves
  // tags against both peers' registered manifests; the complement becomes the
  // skip summary. Raiden attaches no meaning to any tag value.
  repeated string transfer_pool_tags = 13;
  // Multi-tag transfers: splits dst_device_block_ids into one contiguous
  // run per entry of transfer_pool_tags (same order; counts must sum to
  // len(dst_device_block_ids)). Empty with a single tag preserves the
  // legacy semantics (the whole list belongs to the one tag).
  repeated int32 dst_block_counts = 14;
}

// One contiguous (or uniformly strided) byte copy between one source block
// and one destination block of the same pool. Ordinals index the owning
// registration's block_ids / the transfer's destination block id list —
// never physical ids. This is the byte-span registration IR: it mirrors the
// executor wire (ShardPushEntryProto fields 3-10) so the controller binds
// and re-keys without any token or unit arithmetic.
message PoolByteSpan {
  int64 src_block_ordinal = 1;
  int64 src_offset_bytes = 2;
  // Index into the transfer's destination block id list.
  int64 dst_block_index = 3;
  int64 dst_offset_bytes = 4;
  int64 size_bytes = 5;
  // Optional uniformly-strided repeat (mirrors ShardPushEntryProto 8-10).
  // count <= 1 with zero strides means a plain contiguous range.
  int64 src_stride_bytes = 6;
  int64 dst_stride_bytes = 7;
  int32 count = 8;
}

// A rank's declared contribution to one pool tag, lowered to bytes by the
// producer. A tag naming a tag class (e.g. "fa") applies to every selected
// pool of that class; group-suffixed tags (e.g. "gdn.ssm.g1") register one
// entry each. Raiden attaches no meaning to any tag value.
message PoolSpanRegistration {
  string tag = 1;
  // This rank's source blocks for the tag.
  repeated int64 block_ids = 2;
  repeated PoolByteSpan spans = 3;
  // Bytes this rank contributes to the tag; cross-checked against the sum
  // of spans and, over the claimed union of ranks, against the destination
  // byte coverage.
  int64 declared_bytes = 4;
}

message RegisterRequestBlocksRequest {
  // Field 5 carried the retired token-addressed SourceSpan vocabulary; the
  // byte-span IR (pool_spans) replaced it.
  reserved 5;
  reserved "spans";
  string req_id = 1;
  int64 uuid = 2;
  RaidenIdProto unit = 3;
  repeated int64 block_ids = 4;
  // The registering rank's declared source map: byte-span IR declarations,
  // one per pool tag, lowered by the producer.
  repeated PoolSpanRegistration pool_spans = 7;
}

message ReleaseRequestBlocksRequest {
  string req_id = 1;
  int64 uuid = 2;
  // Distinguishes administrative cleanup (drop the whole registration) from
  // the per-rank release semantics.
  bool force = 3;
}

message CompleteRequestBlocksRequest {
  string req_id = 1;
  int64 uuid = 2;
  RaidenIdProto unit = 3;
}

message CancelRequestBlocksIfUnclaimedRequest {
  string req_id = 1;
  int64 uuid = 2;
}

message GetTransferStatusRequest {
  string req_id = 1;
  int64 uuid = 2;
}

message GetTransferStatusResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_NOT_STARTED = 1;
    STATUS_IN_PROGRESS = 2;
    STATUS_COMPLETED = 3;
    STATUS_FAILED = 4;
  }
  Status status = 1;
}

message ControllerRequest {
  enum Command {
    COMMAND_UNSPECIFIED = 0;
    COMMAND_COORDINATE_TRANSFER = 1;
    COMMAND_GET_TRANSFER_STATUS = 2;
    COMMAND_REGISTER_REQUEST_BLOCKS = 3;
    COMMAND_RELEASE_REQUEST_BLOCKS = 4;
    COMMAND_COMPLETE_REQUEST_BLOCKS = 5;
    COMMAND_CANCEL_REQUEST_BLOCKS_IF_UNCLAIMED = 6;
  }
  Command command = 1;

  CoordinateTransferRequest coordinate_transfer_request = 2;
  GetTransferStatusRequest get_transfer_status_request = 3;
  // Fields 8+ deliberately avoid raiden_service.proto ControlRequest's field
  // space (1-4): the server body-sniffs one TCP payload against both message
  // types, and a shared (command, field) pair would misroute legacy worker
  // commands into the D5 registry handlers.
  RegisterRequestBlocksRequest register_request_blocks_request = 8;
  ReleaseRequestBlocksRequest release_request_blocks_request = 9;
  CompleteRequestBlocksRequest complete_request_blocks_request = 10;
  CancelRequestBlocksIfUnclaimedRequest
      cancel_request_blocks_if_unclaimed_request = 11;
}

message ControllerResponse {
  bool success = 1;
  string message = 2;
  GetTransferStatusResponse get_transfer_status_response = 3;
  // Command-specific scalar result (e.g. cancellation verdict, retire count).
  string response_data = 4;
}
