syntax = "proto3";

package tpu_raiden.rpc;

service CoordinationService {
  // Queries peer server and returns metadata (port, block_ids, host_ip).
  rpc GetTransferMetadata(MetadataRequest) returns (MetadataResponse);

  // Signals peer CoordinationServer to shut down and exit.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // Collects the metadata info across all replicas.
  rpc CollectReplicaInfo(CollectReplicaInfoRequest)
      returns (CollectReplicaInfoResponse);
}

message MetadataRequest {
  string client_id = 1;
}

message EndpointDescriptor {
  string endpoint = 1;  // "IP:port"
  repeated int64 shards = 2;
}

message MetadataResponse {
  repeated EndpointDescriptor endpoints = 1;
  uint64 transfer_uuid = 2;
  string transfer_req_id = 3;
  repeated int32 block_ids = 4;
}

message ShutdownRequest {
  string client_id = 1;
}

message ShutdownResponse {
  bool success = 1;
}

message CollectReplicaInfoRequest {
  int32 device_id = 1;
  int32 expected_count = 2;
  // Metadata to be shared with other replicas.
  // For weight synchronizer, this is a 5-integer vector:
  // - info[0:4]: 16 bytes of IPv6 address (or IPv4-mapped IPv6)
  // - info[4]: port number
  repeated int32 info = 3;
}

message CollectReplicaInfoResponse {
  repeated ReplicaInfoEntry entries = 1;
}

message ReplicaInfoEntry {
  int32 device_id = 1;
  // Metadata shared by this replica.
  // For weight synchronizer, this is a 5-integer vector:
  // - info[0:4]: 16 bytes of IPv6 address (or IPv4-mapped IPv6)
  // - info[4]: port number
  repeated int32 info = 2;
}
