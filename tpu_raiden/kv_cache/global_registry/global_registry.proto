syntax = "proto3";

package tpu_raiden.kv_cache.global_registry;

import "tpu_raiden/rpc/raiden_service.proto";

option java_multiple_files = true;
option java_outer_classname = "GlobalRegistry";

// WARNING: This API is currently under active development and is not
// stabilized. It is subject to backward-incompatible changes without prior
// notice.
service GlobalRegistryService {
  // Registers a batch of KV cache entries.
  rpc Register(RegisterRequest) returns (RegisterResponse) {  }

  // Looks up KV cache entries for a batch of prefix hashes.
  // The lookup processes prefix hashes sequentially and stops at the first miss
  // (a hash with no active registrations). All subsequent prefix hashes in the
  // request are treated as misses and will be absent from the response map.
  rpc Lookup(LookupRequest) returns (LookupResponse) {  }

  // Unregisters a KV cache entry (e.g. on eviction).
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse) {  }

  // Pulls all active registrations owned by a single RaidenId, streamed in
  // batches. Intended for owner restart handling: a restarted owner either
  // reconstructs its local KV cache metadata from the returned entries, or
  // bulk-unregisters them if the backing data did not survive the restart.
  //
  // Consistency: the stream is not a point-in-time snapshot. Each entry is
  // individually consistent at the time its batch is read; entries deleted or
  // expired while the stream is in flight are omitted. In the intended
  // restart workflow the caller is the owner itself and issues no writes
  // during the pull, so the result is effectively complete. Callers pulling
  // a live owner's entries should note that registrations made while the
  // stream is in flight are not guaranteed to be visible. Entry order is
  // unspecified. Batching is a server-side configuration; clients should
  // simply iterate the stream.
  rpc PullOwned(PullOwnedRequest) returns (stream PullOwnedResponse) {  }
}

message KVBlockMetadata {
  // Logical owner identity.
  tpu_raiden.rpc.RaidenIdProto raiden_id = 1;
  // Identifier for the cache block on the host. Must be non-negative (>= 0),
  // representing the logical index in the host's physical block allocation
  // pool.
  int32 block_id = 2;
}

message RegisterEntry {
  string prefix_hash = 1;
  KVBlockMetadata metadata = 2;
  // Time-to-live for this registration in seconds. If positive, the entry will
  // automatically expire and be eligible for background cleanup after this
  // duration. During lookups, expired entries are lazily filtered out.
  //
  // If 0 or negative, the server's default TTL is used (which defaults to 1
  // hour in the server implementation).
  //
  // Rules of thumb for setting TTL:
  // - For stable environments with low worker churn, a longer TTL (e.g., 30+
  // minutes)
  //   is recommended to maximize cache hit rates.
  // - For dynamic environments or unstable workers, a shorter TTL (e.g., 5-10
  // minutes)
  //   helps minimize stale lookups if a worker crashes before unregistering.
  // - The TTL should generally be larger than the expected time between cache
  // reuses.
  int64 ttl_seconds = 3;
}

message RegisterRequest {
  repeated RegisterEntry entries = 1;
}

message RegisterResponse {
  bool success = 1;
  string error_message = 2;
}

message LookupRequest {
  // Ordered list of prefix hashes, from the shortest prefix (e.g., first
  // logical block) to the longest prefix (e.g., full prompt). Each hash is
  // typically computed cumulatively based on the previous prefix hash, forming
  // a dependency chain. The lookup executes sequentially and terminates at the
  // first miss.
  repeated string prefix_hashes = 1;
}

message LookupResponse {
  // List of metadata corresponding to the prefix hashes in the LookupRequest.
  // The i-th metadata corresponds to the i-th prefix hash in the request.
  // Due to stop-on-first-miss behavior, this list will only contain entries
  // up to the first miss (i.e., its length will be equal to the number of
  // sequential hits before the first miss).
  //
  // TODO: Optimize response size when multiple blocks are on the same
  // worker (e.g., by deduplicating RaidenIds into a list and using
  // indices in results).
  // TODO: Consider supporting replicated cache blocks (which currently
  // overwrite each other in the registry).
  repeated KVBlockMetadata results = 1;
}

message UnregisterRequest {
  repeated string prefix_hashes = 1;
  tpu_raiden.rpc.RaidenIdProto raiden_id = 2;
}

message UnregisterResponse {
  bool success = 1;
  string error_message = 2;
}

message PullOwnedRequest {
  // Owner whose active registrations should be returned.
  tpu_raiden.rpc.RaidenIdProto raiden_id = 1;
}

// A single active registration owned by the requested RaidenId.
message PullOwnedEntry {
  string prefix_hash = 1;
  // Identifier for the cache block on the owner's host. See
  // KVBlockMetadata.block_id.
  int32 block_id = 2;
  // Seconds until this registration expires, rounded up to at least 1 for
  // entries that expire. 0 means the registration does not expire (infinite
  // TTL). Clients may use this as a coarse recency signal when rebuilding
  // local metadata, and refresh it via Register after recovery.
  int64 remaining_ttl_seconds = 3;
}

message PullOwnedResponse {
  // One batch of entries. Batch boundaries carry no meaning.
  repeated PullOwnedEntry entries = 1;
}
