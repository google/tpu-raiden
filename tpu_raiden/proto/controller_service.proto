syntax = "proto3";

package tpu_raiden.tpu_raiden.proto;

import "tpu_raiden/proto/worker_service.proto";

// Service definition for TPU Raiden Controller.
service RaidenControllerService {
  // Registers a worker daemon / endpoint with the controller.
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse) {  }

  // Requests a remote read from this controller.
  rpc ReadRemote(ReadRemoteRequest) returns (ReadRemoteResponse) {  }
}

message RegisterWorkerRequest {
  // Unique identifier for the worker (e.g., job_name/replica_id or uuid).
  string worker_id = 1;
  // Control-plane RPC address of the worker (e.g., "ip:port" or BNS).
  string raiden_worker_endpoint = 2;
  // Data-plane socket addresses/endpoints owned by this worker.
  repeated .tpu_raiden.proto.RaidenTransferEndpointProto
      raiden_transfer_endpoints = 3;
  // Unique identifier for this host/node in the distributed mesh. Used by the
  // controller to match source workers to their destination peer worker during
  // ReadRemote. Must be unique per controller.
  int64 node_id = 4;
}

message RegisterWorkerResponse {
  bool success = 1;
  string error_message = 2;
}

message ReadRemoteRequest {
  // Advisory (registry-derived): the source re-derives the authoritative source
  // host block ids from its own LRU after verifying the block_hashes.
  repeated int32 src_host_block_ids = 1;
  repeated int32 dest_host_block_ids = 2;
  repeated .tpu_raiden.proto.BufferProto src_buffers = 3;
  repeated .tpu_raiden.proto.BufferProto dst_buffers = 4;
  // Prefix hashes of the requested blocks. The source controller verifies each
  // exists in its LRU with status HOST/HOST_AND_HBM and pins it for the transfer.
  repeated bytes block_hashes = 5;
}

message ReadRemoteResponse {}
