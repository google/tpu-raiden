syntax = "proto3";

package tpu_raiden.proto;

import "tpu_raiden/rpc/raiden_service.proto";

// Service providing a gRPC communication channel between Raiden Controllers and
// the Raiden Orchestrator for peer discovery and controller resolution.
service OrchestratorService {
  // Registers a controller address for a given RaidenId.
  rpc RegisterController(RegisterControllerRequest)
      returns (RegisterControllerResponse);

  // Resolves the controller address for a given RaidenId.
  rpc ResolveController(ResolveControllerRequest)
      returns (ResolveControllerResponse);
}

// Request to register a controller address for a RaidenId.
message RegisterControllerRequest {
  // Target Raiden work unit (job/replica identifier).
  tpu_raiden.rpc.RaidenIdProto raiden_id = 1;
  // The address of the controller to register (e.g., "ip:port").
  string address = 2;
}

// Response from registering a controller address.
message RegisterControllerResponse {
  bool success = 1;
  string message = 2;
}

// Request to resolve a controller address for a RaidenId.
message ResolveControllerRequest {
  // Target Raiden work unit (job/replica identifier) to resolve.
  tpu_raiden.rpc.RaidenIdProto raiden_id = 1;
}

// Response from resolving a controller address.
message ResolveControllerResponse {
  bool success = 1;
  string message = 2;
  // The resolved controller address (e.g., "ip:port"). If success is false,
  // this is empty.
  string address = 3;
}
