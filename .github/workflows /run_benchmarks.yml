name: Run Benchmarks

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - fix/benchmark_debug
      - V2

  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day

permissions:
  contents: read
  pull-requests: write





jobs: 
  debug_stablehlo:  
      name: Debug stablehlo import
      runs-on: linux-x86-ct5lp-224-8tpu
      container:
        image: us-docker.pkg.dev/ml-oss-artifacts-transient/ml-public-testing-container/ml-build:939285342
      steps:
          - name: Inspect jaxlib native deps
            shell: bash
            run: |
              set -uxo pipefail
              python --version
              python -m pip show jax jaxlib || true
              python - <<'PY'
              import os, glob, subprocess, sys
              import jaxlib
              root = os.path.dirname(jaxlib.__file__)
              print("jaxlib at:", root)
              sos = glob.glob(root + "/**/*stablehlo*.so", recursive=True)
              print("found .so:", sos)
              for so in sos:
                  print("=== ldd", so, "===")
                  subprocess.run(["ldd", so])
              print("=== try import ===")
              try:
                 import jax
                 import jaxlib._stablehlo
                 print("OK: stablehlo import succeeded")
              except Exception as e:
                 print("IMPORT FAILED:", repr(e))
              PY


  run_benchmarks:
    name: Run TPU Raiden H2H Benchmarks
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "benchmarks/benchmark_registry.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      publish_metrics: true
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
