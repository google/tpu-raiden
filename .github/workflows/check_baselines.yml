name: Check Benchmarks

on:
  workflow_dispatch:

  push:
    branches:
      - V6
      
  pull_request:
    branches:
      - V6

  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day

permissions:
  contents: read
  pull-requests: write


jobs:
  record:
    name: Record baselines on v5e-8
    # SAME runner label the gate uses (see benchmark_registry.pbtxt) -- baselines
    # must be measured on the gate's hardware.
    runs-on: linux-x86-ct5lp-224-8tpu
    steps:
      - uses: actions/checkout@v4
      - name: Re-measure baselines (writes gating_baselines.json in place)
        run: bash tpu_raiden/benchmarks/h2d_d2h_record_baselines.sh
      - name: Upload new baselines for human review
        uses: actions/upload-artifact@v4
        with:
          name: gating_baselines
          path: tpu_raiden/benchmarks/gating_baselines.json
      # To auto-open a PR instead of uploading an artifact, swap the step above
      # for peter-evans/create-pull-request and set:
      #   permissions: { contents: write, pull-requests: write }
