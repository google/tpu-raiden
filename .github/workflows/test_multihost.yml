name: Test TPU Multi-Host Runner

on:
  workflow_dispatch:
  push:
    branches:
      - haochengd-google-patch-3
      
  pull_request:
    branches:
      - haochengd-google-patch-3

jobs:
  run_tpu_tests:
    runs-on: linux-x86-ct5lp-4tpu-x4
    steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: 3.11

    - name: Install JAX for TPU
      run: |
        # Install JAX with TPU support and k8s support for JobSet discovery
        pip install -U "jax[tpu,k8s]" -f https://storage.googleapis.com/jax-releases/libtpu_releases.html

    - name: Run TPU multi-host initialization test
      run: |
        python -c "
        import jax
        jax.distributed.initialize()
        print('Global TPU devices:', jax.devices())
        print('Local TPU devices:', jax.local_devices())
        print('TPU Backend:', jax.default_backend())
        "
