# Manual raw-sample data collection for d2h, h2d AND H2H C++. Each workload runs
# in --analyze mode and writes a per-sample CSV into WORKLOAD_ARTIFACTS_DIR; BAP
# uploads them as downloadable artifacts (d2h_h2d_samples.csv, h2h_samples.csv)
# for your own offline analysis. MANUAL ONLY -- no push/PR/cron.
name: Analyze Raw Samples

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Dump raw d2h/h2d/H2H samples as artifacts
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_analyze.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
