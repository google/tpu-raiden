# PATH A, one click, no git commands: type the suspect SHA and Run. The workload
# measures the float32 L64 config at the suspect's parent and at the suspect on
# the SAME machine, and reports the delta + verdict in confirm_result.txt.
# Start with suspect_sha = 012d1f0.

name: Confirm Commit (regression Path A)

on:
  workflow_dispatch:
    inputs:
      suspect_sha:
        description: "suspect commit SHA to test (e.g. 012d1f0)"
        required: true
      parent_sha:
        description: "baseline SHA (optional; default suspect~1)"
        required: false
        default: ""
      thresh_pct:
        description: "drop percent above which the commit is flagged"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  confirm:
    name: Confirm one suspect commit
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_confirm.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
      custom_env_vars: "SUSPECT_SHA=${{ inputs.suspect_sha }} PARENT_SHA=${{ inputs.parent_sha }} THRESH_PCT=${{ inputs.thresh_pct }}"
