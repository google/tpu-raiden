# Run all 10 configs x 200 iters and save every sample. Manual trigger.
# Results (dist_samples.json / dist_samples.csv) are uploaded as run Artifacts.

name: Distribution (10 configs x 200 iters)

on:
  workflow_dispatch:

  push:
    branches:
      - V9roof
      
  pull_request:
    branches:
      - V9roof

  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day test


permissions:
  contents: read
  pull-requests: write

jobs:
  dist:
    name: 10-config distribution sweep
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_dist.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
