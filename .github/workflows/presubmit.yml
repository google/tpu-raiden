# Per-PR gate, running on the v5e TPU runner (linux-x86-ct5lp-224-8tpu): builds
# the JAX extension, confirms the TPU is visible, runs the OSS-safe unit tests
# plus one device test, and an import smoke check. The n2-32 / tpu7x runners were
# not available to this repo (jobs stayed queued unassigned), so v5e is used for
# everything for now. See .github/README.md.

name: CI - Presubmit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'main' }}

# Curated OSS-safe tests. CPU_TEST_TARGETS run without a device; the device test
# exercises the v5e. //rpc/... and //kv_cache/global_registry/... are excluded by
# design (Google-internal grpc) -- see ci/wheel/BUILD.bazel.
env:
  CPU_TEST_TARGETS: >-
    //kv_cache:logical_block_manager_test
    //kv_cache:lru_cache_test
    //tpu_raiden/frameworks/jax:resharding_planner_test
  DEVICE_TEST_TARGETS: >-
    //tpu_raiden/frameworks/jax:raw_transfer_test_gl

jobs:
  build_and_test:
    name: "Presubmit on v5e"
    runs-on: linux-x86-ct5lp-224-8tpu
    container:
      image: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest"
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      # Git's CVE-2022-24765 patch blocks root from operating on runner-owned
      # dirs; trust the ephemeral workspace.
      - name: Fix Git workspace ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install clang-18
        run: ./ci/tools/install_clang18.sh

      - name: Build JAX extension
        run: ./build.sh jax

      - name: Verify TPU is visible
        run: |
          python3 -c "import jax; d=jax.devices(); print('JAX devices:', d); assert any('TPU' in str(x).upper() for x in d), 'no TPU visible'; print('TPU visible OK')"

      - name: Run unit tests
        env:
          RAIDEN_REMOTE_CACHE: "https://storage.googleapis.com/tpu-raiden-bazel-cache"
          RAIDEN_REMOTE_UPLOAD: "false"
        run: ./ci/tools/bazel_test.sh jax -- ${CPU_TEST_TARGETS}

      - name: Run device test (v5e)
        env:
          RAIDEN_REMOTE_CACHE: "https://storage.googleapis.com/tpu-raiden-bazel-cache"
          RAIDEN_REMOTE_UPLOAD: "false"
        run: ./ci/tools/bazel_test.sh jax -- ${DEVICE_TEST_TARGETS}

      - name: Import smoke check (JAX mocked)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/bazel-bin:${PYTHONPATH:-}"
          python3 - <<'PY'
          import sys
          from unittest.mock import MagicMock
          for m in ("jax", "jax.core", "jax.extend", "jax.extend.ffi"):
              sys.modules[m] = MagicMock()
          import tpu_raiden  # noqa: F401
          print("tpu_raiden imported successfully.")
          PY
