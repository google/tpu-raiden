# TEMPORARY: run the C++ vs Python H2H comparison THROUGH BAP (same reusable
# workflow + runner override as run_benchmarks.yml), so it uses BAP's managed
# container on the TPU runner instead of a raw GitHub `container:` block. Delete
# once the Python code is validated.

name: H2H Compare via BAP [TEMP - delete after validation]

on:
  workflow_dispatch:

  push:
    branches:
      - V9

      
  pull_request:
    branches:
      - V9
  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day test


permissions:
  contents: read
  pull-requests: write


jobs:
  h2h_compare:
    name: H2H C++ vs Python (BAP)
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_compare.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
