name: Canary Drift Probe

# One-off characterization, not a gate -- it must never fire on ordinary pushes.
# workflow_dispatch alone is not enough while this lives on a feature branch:
# GitHub only surfaces the "Run workflow" button for files on the DEFAULT branch.
# So it also listens on a dedicated branch: push there to fire it, and nothing
# else in the repo triggers it.
on:
  workflow_dispatch:

  push:
    branches:
      - v10
      
  pull_request:
    branches:
      - v10

  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day

permissions:
  contents: read
  pull-requests: write

jobs:
  # Pinned to the commit that shipped A/B colocated mode (per Andrew Dame on
  # the BAP thread). This probe does not use ab_mode, so it does not need the
  # new ref -- it takes it anyway, deliberately: it is manual and non-blocking,
  # so it is the cheapest place to find out whether the bump breaks anything
  # before the post-submit A/B test has to depend on it.
  canary_drift:
    name: Same-machine drift characterization (unsaturated KV canaries)
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@e34d5b724ee5daac083881a891d25964081a9f6a
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_drift.pbtxt"
      ml_actions_ref: "e34d5b724ee5daac083881a891d25964081a9f6a"
      runner: "linux-x86-n2-32"
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
