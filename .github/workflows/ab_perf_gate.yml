# METHOD 1 (recommended first): confirm a single suspect commit via BAP ab_mode.
# Dispatch this workflow from a ref pointing at the SUSPECT commit (that is the
# "experiment"), and set baseline_sha to the suspect's PARENT. BAP measures both,
# ab_analyzer compares, and posts the delta. The float32 L64 signal is ~14%, far
# above cross-machine noise, so today's (separate-machine) ab_mode is enough.
#
# NOTE: verify the exact input name for the baseline ref against BAP docs
# (run-benchmarks.yaml); it may be `baseline_ref` or `base_ref`.

name: A/B Perf Check (confirm a commit)

on:
  workflow_dispatch:
    inputs:
      baseline_sha:
        description: "baseline ref to compare against (the SUSPECT's parent, e.g. sha of 012d1f0~1)"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ab_check:
    name: H2D/D2H A/B check
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@affd28b492f67c242afa8b119e590b25816b7b88
    with:
      registry_file: "tpu_raiden/benchmarks/benchmark_registry_ab.pbtxt"
      ml_actions_ref: "affd28b492f67c242afa8b119e590b25816b7b88"
      runner: "linux-x86-n2-32"
      ab_mode: true
      baseline_ref: "${{ inputs.baseline_sha }}"
      post_pr_comment: true
      publish_metrics: false
      pub_sub_gcp_project_id: "ml-oss-benchmarking-production"
      pub_sub_gcp_topic_id: "public-results-prod"
