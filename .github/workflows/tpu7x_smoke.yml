# Probe workflow: validates whether the linux-x86-tpu7x-224-4tpu (TPU v7) runner
# scale-set is available to this repo, and whether the ml-build container can see
# the v7 chips and run a device test. If v7 is confirmed, TPU lanes can be folded
# back into presubmit/nightly. Delete this file once that decision is made.

name: CI - tpu7x (v7) smoke probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  tpu7x_smoke:
    name: "Smoke on tpu7x (v7)"
    runs-on: linux-x86-tpu7x-224-4tpu
    container:
      image: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest"
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - name: Fix Git workspace ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Show runner / container info
        run: |
          echo "Runner: ${RUNNER_NAME:-?} on ${RUNNER_OS:-?}"
          uname -a; nproc
      - name: Install clang-18
        run: ./ci/tools/install_clang18.sh
      - name: Build JAX extension
        run: ./build.sh jax
      - name: Verify TPU v7 visible from container
        run: |
          python3 -c "import jax; d=jax.devices(); print('JAX devices:', d); assert any('TPU' in str(x).upper() for x in d), 'no TPU visible'; print('TPU visible OK')"
      - name: Run one TPU device test
        env:
          RAIDEN_REMOTE_CACHE: "https://storage.googleapis.com/tpu-raiden-bazel-cache"
          RAIDEN_REMOTE_UPLOAD: "false"
        run: ./ci/tools/bazel_test.sh jax -- //tpu_raiden/frameworks/jax:raw_transfer_test_gl
