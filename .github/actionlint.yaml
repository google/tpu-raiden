# Declares the self-hosted runner labels used by the workflows so actionlint
# does not flag them as unknown. CPU-only for now; add TPU scale-set labels here
# (e.g. linux-x86-tpu7x-224-4tpu) once google/tpu-raiden is granted them.
self-hosted-runner:
  labels:
    - linux-x86-n2-32   # CPU
