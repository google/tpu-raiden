# does not flag them as unknown. Only the v5e scale-set is currently available to
# this repo; n2-32 and tpu7x stayed queued/unassigned.
self-hosted-runner:
  labels:
    - linux-x86-ct5lp-224-8tpu     # TPU v5e, 8 chips
